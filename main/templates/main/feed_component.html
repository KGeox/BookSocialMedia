{% load static %}
            <div class="feed-component">
                {% for post in posts  %}
                    <div class="post-card">
                        <div class="post-control">
                            {% if request.user == post.author.user %}
                                <a href="{% url 'update-post' post.id %}">Edit</a>
                                <a href="{% url 'delete-post' post.id %}">Delete</a>
                            {% endif %}
                        </div>
                        <div class="post-viewing">
                            {% if post.image %}
                            <img alt="" src="{{post.image.url}}" class="post-image"/>
                            {% endif %}
                            <a href="{% url 'profile' post.author.id %}">@{{ post.author }}</a>
                            <a href="{% url 'post' post.id %}" class="post-title"> <h2>{{ post.title }}</h2></a>
                        </div>
                    </div>
                    <hr>
                {% endfor %}
            </div>
